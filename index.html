<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f4f4f2" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Julie Photos" />
    <meta
      name="description"
      content="A clean, mobile-first launcher for favorite Google Photos destinations."
    />
    <title>Julie Photos</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <p class="eyebrow">Google Photos Launcher</p>
        <h1>Julie Photos</h1>
        <p class="subtitle">A quiet little home screen for your favorite memories.</p>
      </header>

      <section class="tile-grid" aria-label="Photo destinations">
        <a class="tile tile-gallery" href="https://photos.google.com/" target="_blank" rel="noreferrer">
          <span class="tile-label">Gallery</span>
          <span class="tile-meta">All photos</span>
        </a>

        <a
          class="tile tile-favorites"
          href="https://photos.google.com/album/ALBUM_ID"
          target="_blank"
          rel="noreferrer"
        >
          <!-- Replace the Favorites placeholder URL above with your real Google Photos album link. -->
          <span class="tile-label">Favorites</span>
          <span class="tile-meta">Saved highlights</span>
        </a>

        <a
          class="tile tile-family"
          href="https://photos.google.com/album/ALBUM_ID"
          target="_blank"
          rel="noreferrer"
        >
          <!-- Replace the Family placeholder URL above with your real Google Photos album link. -->
          <span class="tile-label">Family</span>
          <span class="tile-meta">Shared moments</span>
        </a>

        <a
          class="tile tile-trips"
          href="https://photos.google.com/album/ALBUM_ID"
          target="_blank"
          rel="noreferrer"
        >
          <!-- Replace the Trips placeholder URL above with your real Google Photos album link. -->
          <span class="tile-label">Trips</span>
          <span class="tile-meta">Places and weekends</span>
        </a>

        <a
          class="tile tile-kids tile-wide"
          href="https://photos.google.com/album/ALBUM_ID"
          target="_blank"
          rel="noreferrer"
        >
          <!-- Replace the Kids placeholder URL above with your real Google Photos album link. -->
          <span class="tile-label">Kids</span>
          <span class="tile-meta">Everyday magic</span>
        </a>
      </section>
    </main>
  </body>
</html>
